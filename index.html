.tb-title{font-size:15px;font-weight:800}
.tb-sub{font-size:11.5px;color:var(--t3);margin-top:1px}
.content{padding:24px 26px;flex:1}

.td2{color:var(--t2);font-size:12px}

.fgrid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}

label{font-size:11.5px;font-weight:700;color:var(--t2)}

select option{background:var(--s2)}
textarea{resize:vertical;min-height:76px;line-height:1.55}

.empty-txt{font-size:13.5px;margin-bottom:14px}

.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.info-box{background:var(--s3);border-radius:7px;padding:8px 11px}
.info-lbl{font-size:9px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.info-val{font-size:12.5px;font-weight:600}
</style>
</head>

const KEY = 'hr_v4';

  try { const r = localStorage.getItem(KEY); if(r) return JSON.parse(r); } catch(e){}
  return JSON.parse(JSON.stringify(SEED));
})();
const save = () => localStorage.setItem(KEY, JSON.stringify(D));
const uid = p => { const id=`${p}_${String(D.nid).padStart(4,'0')}`; D.nid++; save(); return id; };

let curView='dashboard', selEmp=null;
function nav(v,params={}){
  curView=v; if(params.empId) selEmp=params.empId;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const m={dashboard:'nav-dashboard',employees:'nav-employees','emp-detail':'nav-employees'};
  const el=document.getElementById(m[v]); if(el) el.classList.add('active');
  render();
}
function render(){
  if(curView==='dashboard') renderDash();
  else if(curView==='employees') renderEmpList();

}

// ── HELPERS ────────────────────────────────────────────────────────────────────
const fm = n => (n&&n>0)?new Intl.NumberFormat('vi-VN').format(Math.round(n))+' đ':'—';
const fms = n => {
  if(!n||n===0) return '—';
  if(n>=1e9) return (n/1e9).toFixed(1)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return Math.round(n/1e3)+'K';
  return String(Math.round(n));
};
const fd = d => d?new Date(d).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
const ini = n => {if(!n) return '?'; const w=n.trim().split(' '); return w.slice(-2).map(x=>x[0]).join('').toUpperCase();};

// Tính thâm niên từ ngày chính thức đến hiện tại
const calcSeniority = (officialDate) => {
  if(!officialDate) return '—';
  const start = new Date(officialDate);
  const now = new Date('2026-03-30');
  let totalMonths = (now.getFullYear()-start.getFullYear())*12 + (now.getMonth()-start.getMonth());
  if(totalMonths < 0) totalMonths = 0;
  const y = Math.floor(totalMonths/12), m = totalMonths%12;
  if(y && m) return `${y} năm ${m} tháng`;
  if(y) return `${y} năm`;
  if(m) return `${m} tháng`;
  return '< 1 tháng';
};

const totalAllowance = e => (e.allowances?.meal||0) + (e.allowances?.gas||0) + (e.allowances?.other||0);
const latestRev = e => e.reviews?.length ? [...e.reviews].sort((a,b)=>new Date(b.reviewDate)-new Date(a.reviewDate))[0] : null;
const latestBasic    = e => { const r=latestRev(e); return r?(r.approvedSalary||r.currentBaseSalary||0):0; };
const currentBasic   = e => { const r=latestRev(e); return r?(r.currentBaseSalary||0):(e.luongCB||0); };
const approvedBasic  = e => { const r=latestRev(e); return r?(r.approvedSalary||0):0; };
const latestComm  = e => { const r=latestRev(e); return r?(r.avgCommission||0):0; };
const latestSales = e => { const r=latestRev(e); return r?(r.avgSales6m||0):0; };
const totalIncome = e => latestBasic(e) + latestComm(e) + totalAllowance(e);
const branchBadge = b => ({'Quan Hoa':'b-blue','Hà Đông':'b-acc','TXS':'b-pur'}[b]||'b-gray');
const posBadge = p => { if(!p) return 'b-gray'; if(p.includes('QL')||p.includes('Quản')) return 'b-red'; if(p.includes('CV')||p.includes('Chuyên')) return 'b-teal'; if(p.includes('KTV')||p.includes('Kỹ')) return 'b-blue'; return 'b-gray'; };

// ── CUSTOM OPTIONS ─────────────────────────────────────────────────────────────
function addOpt(type, selId) {
  const labels = {branches:'cơ sở',positions:'chức danh',depts:'phòng ban',shifts:'ca làm việc'};
  const val = prompt(`Nhập tên ${labels[type]} mới:`);
  if(!val||!val.trim()) return;
  const v = val.trim();
  if(!opts()[type].includes(v)) { opts()[type].push(v); save(); }
  const sel = document.getElementById(selId);
  if(sel) {
    if(![...sel.options].find(o=>o.value===v)) {
      const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o);
    }
    sel.value = v;
  }
}
function selOpts(type, selId, cur='') {
  const list = opts()[type]||[];
  return `<div class="sel-row"><select id="${selId}"><option value="">-- Chọn --</option>${list.map(v=>`<option value="${v}" ${v===cur?'selected':''}>${v}</option>`).join('')}</select><button type="button" class="btn-plus" onclick="addOpt('${type}','${selId}')" title="Thêm mới">+</button></div>`;
}

function updRev(){ D.company.revenue=parseFloat(document.getElementById('rev-input').value)||0; save(); renderDash(); }
function drawCharts(branches,totalBasic,totalComm,totalAllow){
  const bCtx=document.getElementById('ch-branch');
  if(bCtx) new Chart(bCtx,{type:'bar',data:{labels:branches.map(([n])=>n),datasets:[{label:'Lương CB',data:branches.map(([,d])=>d.basic),backgroundColor:'rgba(212,160,23,.75)',borderRadius:4},{label:'HH/DV',data:branches.map(([,d])=>d.comm),backgroundColor:'rgba(56,139,253,.75)',borderRadius:4},{label:'Phụ cấp',data:branches.map(([,d])=>d.allow),backgroundColor:'rgba(232,130,58,.65)',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8b949e',font:{family:'Be Vietnam Pro',size:11}}},tooltip:{callbacks:{label:c=>`${c.dataset.label}: ${fms(c.raw)}`}}},scales:{x:{stacked:true,ticks:{color:'#8b949e'},grid:{color:'#21262d'}},y:{stacked:true,ticks:{color:'#8b949e',callback:v=>fms(v)},grid:{color:'#21262d'}}}}});
  const cCtx=document.getElementById('ch-comp');
  const tot=totalBasic+totalComm+totalAllow;
  if(cCtx&&tot>0) new Chart(cCtx,{type:'doughnut',data:{labels:['Lương cơ bản','HH / Dịch vụ','Phụ cấp'],datasets:[{data:[totalBasic,totalComm,totalAllow],backgroundColor:['rgba(212,160,23,.8)','rgba(56,139,253,.8)','rgba(232,130,58,.8)'],borderColor:['#d4a017','#388bfd','#e8823a'],borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,cutout:'64%',plugins:{legend:{position:'bottom',labels:{color:'#8b949e',font:{family:'Be Vietnam Pro',size:11},padding:14}},tooltip:{callbacks:{label:c=>`${c.label}: ${fms(c.raw)} (${tot>0?(c.raw/tot*100).toFixed(1):0}%)`}}}}});
}

function empRows(emps){
  return emps.map(e=>{
    const basic=currentBasic(e), approved=approvedBasic(e), comm=latestComm(e), sales=latestSales(e);
    const allow=totalAllowance(e), total=totalIncome(e);
    const rc=e.reviews?.length||0;
    const allowChips=allowChipsHtml(e.allowances);
    return `<tr class="tr-click" style="cursor:pointer" onclick="nav('emp-detail',{empId:'${e.id}'})">
      <td><div style="display:flex;align-items:center;gap:9px">
        <div style="width:30px;height:30px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0d1117;flex-shrink:0">${ini(e.name)}</div>
        <div><div style="font-weight:700">${e.name}</div><div class="td2" style="font-size:10.5px">${e.dept||''}</div></div>
      </div></td>
      <td><span class="badge ${branchBadge(e.branch)}">${e.branch||'—'}</span></td>
      <td><span class="badge ${posBadge(e.position)}">${e.position||'—'}</span></td>
      <td><span class="money">${basic?fms(basic):'—'}</span></td>
      <td>${approved?`<span class="money c-green" style="font-weight:700">${fms(approved)}</span>${approved>basic?`<span style="font-size:9px;color:var(--green);margin-left:3px">▲${fms(approved-basic)}</span>`:''}` :`<span class="td2" style="font-size:10.5px">Chưa duyệt</span>`}</td>
      <td><span class="money c-pur">${comm?fms(comm):'—'}</span></td>
      <td><span class="money c-green" style="font-weight:700">${total?fms(total):'—'}</span></td>
      <td>
        <span class="money c-ora">${allow?fms(allow):'—'}</span>
        ${allow?`<div class="allow-chips">${allowChips}</div>`:''}
      </td>
      <td><span class="money c-teal">${sales?fms(sales):'—'}</span></td>
      <td onclick="event.stopPropagation()"><div class="flex-gap">
        <button class="btn btn-ghost btn-sm" onclick="openEditEmp('${e.id}')">✏️</button>
        <button class="btn btn-danger btn-sm" onclick="delEmp('${e.id}')">🗑️</button>
      </div></td>
    </tr>`;
  }).join('');
}
function allowChipsHtml(a){
  if(!a) return '';
  let html='';
  if(a.meal) html+=`<span class="allow-chip meal">🍱 ${fms(a.meal)}</span>`;
  if(a.gas) html+=`<span class="allow-chip gas">⛽ ${fms(a.gas)}</span>`;
  if(a.other) html+=`<span class="allow-chip other">+ ${fms(a.other)}</span>`;
  return html;
}
function filterEmps(){
  const q=document.getElementById('q').value.toLowerCase();
  const f=D.employees.filter(e=>e.name.toLowerCase().includes(q)||(e.branch||'').toLowerCase().includes(q)||(e.position||'').toLowerCase().includes(q)||(e.dept||'').toLowerCase().includes(q));
  const tb=document.getElementById('emp-tb'); if(tb) tb.innerHTML=empRows(f);
}

      <div class="fsec"><div class="fsec-title">👤 Thông tin cơ bản</div>
        <div class="fgrid">
          <div class="fg full"><label>Họ & Tên *</label><input id="f-name" value="${emp?.name||''}" placeholder="Nguyễn Văn A"></div>
          <div class="fg"><label>Cơ sở</label>${selOpts('branches','f-branch',emp?.branch||'')}</div>
          <div class="fg"><label>Chức danh</label>${selOpts('positions','f-pos',emp?.position||'')}</div>
          <div class="fg"><label>Phòng ban</label>${selOpts('depts','f-dept',emp?.dept||'')}</div>
          <div class="fg"><label>Ca làm việc</label>${selOpts('shifts','f-shift',emp?.shift||'')}</div>
        </div>
      </div>
      <div class="fsec"><div class="fsec-title">📅 Thâm niên</div>
        <div class="fgrid">
          <div class="fg"><label>Ngày vào công ty</label><input type="date" id="f-joindate" value="${emp?.joinDate||''}"></div>
          <div class="fg"><label>Ngày chính thức</label><input type="date" id="f-officialdate" value="${emp?.officialDate||''}"></div>
          <div class="fg"><label>Thâm niên (tự tính)</label><input readonly id="f-sen-display" value="${emp?.officialDate?calcSeniority(emp.officialDate):''}" placeholder="Tự tính từ ngày chính thức"></div>
        </div>
      </div>
      <div class="fsec"><div class="fsec-title">💰 Thông tin lương</div>
        <div class="fgrid">
          <div class="fg"><label>Lương ca sáng (đ)</label><input type="number" id="f-morning" value="${emp?.morningShiftSalary||''}" placeholder="Tự tính từ lương CB"></div>
          <div class="fg"><label>Lương ca chiều (đ)</label><input type="number" id="f-afternoon" value="${emp?.afternoonShiftSalary||''}" placeholder="Tự tính từ lương CB"></div>
          <div class="fg"><label>Lương CB trung bình (đ)</label><input type="number" id="f-avgbasic" value="${emp?.avgBaseSalary||''}" placeholder="Để trống — điền sau"></div>
        </div>
      </div>
      <div class="fsec"><div class="fsec-title">🎁 Phụ cấp</div>
        <div class="fgrid-3">
          <div class="fg"><label>Phụ cấp ăn ca (đ/tháng)</label><input type="number" id="f-meal" value="${a.meal||''}" placeholder="520000"></div>
          <div class="fg"><label>Phụ cấp xăng xe (đ/tháng)</label><input type="number" id="f-gas" value="${a.gas||''}" placeholder="300000"></div>
          <div class="fg"><label>Phụ cấp khác (đ/tháng)</label><input type="number" id="f-other" value="${a.other||''}" placeholder="0"></div>
        </div>
      </div>
    </div>
    <div class="mfoot"><button class="btn btn-ghost" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="saveEmp('${emp?.id||''}')">Lưu</button></div>`);

  // Auto-update seniority display on date change
  const officialInput = document.getElementById('f-officialdate');
  const senDisplay = document.getElementById('f-sen-display');
  if(officialInput && senDisplay){
    officialInput.addEventListener('change', () => {
      senDisplay.value = officialInput.value ? calcSeniority(officialInput.value) : '';
    });
  }
}
function saveEmp(id){
  const name=document.getElementById('f-name').value.trim(); if(!name){alert('Vui lòng nhập tên');return;}
  const data={
    name,
    branch:document.getElementById('f-branch').value,
    position:document.getElementById('f-pos').value,
    dept:document.getElementById('f-dept').value,
    shift:document.getElementById('f-shift').value,
    joinDate:document.getElementById('f-joindate').value,
    officialDate:document.getElementById('f-officialdate').value,
    morningShiftSalary:+document.getElementById('f-morning').value||0,
    afternoonShiftSalary:+document.getElementById('f-afternoon').value||0,
    avgBaseSalary:+document.getElementById('f-avgbasic').value||0,
    allowances:{
      meal:+document.getElementById('f-meal').value||0,
      gas:+document.getElementById('f-gas').value||0,
      other:+document.getElementById('f-other').value||0
    }
  };
  if(id){const e=D.employees.find(x=>x.id===id);if(e)Object.assign(e,data);}
  else D.employees.push({id:uid('emp'),...data,reviews:[]});
  save();closeModal();render();
}
function delEmp(id){
  const e=D.employees.find(x=>x.id===id); if(!e||!confirm(`Xóa nhân sự "${e.name}"?`))return;
  D.employees=D.employees.filter(x=>x.id!==id); save(); if(curView==='emp-detail')nav('employees');else render();
}

// ── REVIEW MODAL ───────────────────────────────────────────────────────────────
function openAddRev(empId){revModal(empId,null);}
function openEditRev(empId,revId){revModal(empId,revId);}
function revModal(empId,revId){
  const emp=D.employees.find(e=>e.id===empId); if(!emp)return;
  const rev=revId?emp.reviews.find(r=>r.id===revId):null;
  const n=rev?.notes||{};
  showModal(`
    <div class="mhd"><div class="mhd-title">${rev?'Sửa đợt review':'Thêm đợt review'} — ${emp.name}</div><button class="m-close" onclick="closeModal()">✕</button></div>
    <div class="mbody" style="max-height:72vh;overflow-y:auto">
      <div class="fsec"><div class="fsec-title">📅 Thông tin đợt review</div>
        <div class="fgrid"><div class="fg"><label>Ngày review *</label><input type="date" id="r-date" value="${rev?.reviewDate||new Date().toISOString().slice(0,10)}"></div></div>
      </div>
      <div class="fsec"><div class="fsec-title">💰 Thông tin lương</div>
        <div class="fgrid">
          <div class="fg"><label>Lương cơ bản hiện tại (đ)</label><input type="number" id="r-basic" placeholder="5000000" value="${rev?.currentBaseSalary||''}"></div>
          <div class="fg"><label>HH / Dịch vụ trung bình (đ)</label><input type="number" id="r-comm" placeholder="3000000" value="${rev?.avgCommission||''}"></div>
          <div class="fg"><label>DT bán hàng TB 6 tháng (đ)</label><input type="number" id="r-sales" placeholder="50000000" value="${rev?.avgSales6m||''}"><span class="hint">Doanh thu sản phẩm/dịch vụ do NV tạo ra</span></div>
          <div class="fg"><label>Đề xuất từ nhân viên (đ)</label><input type="number" id="r-emp" value="${rev?.empProposed||''}"></div>
          <div class="fg"><label>Đề xuất từ quản lý (đ)</label><input type="number" id="r-mgr" value="${rev?.mgrProposed||''}"></div>
          <div class="fg"><label>Đề xuất từ ban vận hành (đ)</label><input type="number" id="r-ops" value="${rev?.opsProposed||''}"></div>
          <div class="fg"><label>Lương được duyệt chính thức (đ)</label><input type="number" id="r-app" value="${rev?.approvedSalary||''}"></div>
          <div class="fg"><label>Ngày duyệt chính thức</label><input type="date" id="r-appdate" value="${rev?.approvedDate||''}"></div>
        </div>
      </div>
      <div class="fsec"><div class="fsec-title">📝 Ghi chú review</div>
        <div class="fgrid">
          <div class="fg"><label>✅ Ưu điểm</label><textarea id="r-pros" placeholder="Điểm mạnh, thành tích...">${n.pros||''}</textarea></div>
          <div class="fg"><label>⚠️ Nhược điểm</label><textarea id="r-cons" placeholder="Điểm cần cải thiện...">${n.cons||''}</textarea></div>
          <div class="fg"><label>🎯 JTBD của quản lý</label><textarea id="r-jtbd" placeholder="Quản lý kỳ vọng gì...">${n.managerJTBD||''}</textarea></div>
          <div class="fg"><label>💭 Mong muốn của nhân viên</label><textarea id="r-wish" placeholder="Nhân viên muốn gì...">${n.employeeWish||''}</textarea></div>
          <div class="fg full"><label>🚀 Kế hoạch hành động sau review</label><textarea id="r-action" style="min-height:90px" placeholder="Action plan cụ thể...">${n.actionPlan||''}</textarea></div>
        </div>
      </div>
    </div>
    <div class="mfoot"><button class="btn btn-ghost" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="saveRev('${empId}','${revId||''}')">Lưu đợt review</button></div>`);
}
function saveRev(empId,revId){
  const emp=D.employees.find(e=>e.id===empId); if(!emp)return;
  const d=document.getElementById('r-date').value; if(!d){alert('Chọn ngày review');return;}
  const data={reviewDate:d,currentBaseSalary:+document.getElementById('r-basic').value||0,avgCommission:+document.getElementById('r-comm').value||0,avgSales6m:+document.getElementById('r-sales').value||0,empProposed:+document.getElementById('r-emp').value||0,mgrProposed:+document.getElementById('r-mgr').value||0,opsProposed:+document.getElementById('r-ops').value||0,approvedSalary:+document.getElementById('r-app').value||0,approvedDate:document.getElementById('r-appdate').value,notes:{pros:document.getElementById('r-pros').value.trim(),cons:document.getElementById('r-cons').value.trim(),managerJTBD:document.getElementById('r-jtbd').value.trim(),employeeWish:document.getElementById('r-wish').value.trim(),actionPlan:document.getElementById('r-action').value.trim()}};
  if(!emp.reviews) emp.reviews=[];
  if(revId){const i=emp.reviews.findIndex(r=>r.id===revId);if(i!==-1)emp.reviews[i]={...emp.reviews[i],...data};}
  else emp.reviews.push({id:uid('rev'),...data});
  save();closeModal();render();
}
function delRev(empId,revId){
  if(!confirm('Xóa đợt review này?'))return;
  const emp=D.employees.find(e=>e.id===empId); if(!emp)return;
  emp.reviews=emp.reviews.filter(r=>r.id!==revId); save();render();
}

// ── EXPORT EXCEL ───────────────────────────────────────────────────────────────
function exportExcel(){
  const wb = XLSX.utils.book_new();
  const sumHeader = ['Họ & Tên','Cơ sở','Chức danh','Ca làm việc','Ngày vào CT','Ngày chính thức','Thâm niên','Lương CB mới nhất','Lương CB TB','Lương ca sáng','Lương ca chiều','PC ăn ca','PC xăng xe','PC khác','Tổng phụ cấp','HH/DV TB','DT BH TB 6th','Tổng TN TB','Số đợt review'];
  const sumRows = D.employees.map(e=>{
    const r = latestRev(e);
    const a = e.allowances||{};
    const tAllow = (a.meal||0)+(a.gas||0)+(a.other||0);
    return [
      e.name||'',e.branch||'',e.position||'',e.shift||'',
      e.joinDate||'',e.officialDate||'',calcSeniority(e.officialDate),
      r?(r.approvedSalary||r.currentBaseSalary||0):0,
      e.avgBaseSalary||0,
      e.morningShiftSalary||0,e.afternoonShiftSalary||0,
      a.meal||0,a.gas||0,a.other||0,tAllow,
      r?(r.avgCommission||0):0,r?(r.avgSales6m||0):0,
      (r?(r.approvedSalary||r.currentBaseSalary||0):0)+(r?(r.avgCommission||0):0)+tAllow,
      e.reviews?.length||0
    ];
  });
  const ws = XLSX.utils.aoa_to_sheet([sumHeader,...sumRows]);
  ws['!cols'] = [20,12,14,12,13,13,15,16,14,14,14,12,12,12,13,14,14,14,8].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws, 'Tổng hợp nhân sự');
  XLSX.writeFile(wb, `HR_Review_${new Date().toISOString().slice(0,10)}.xlsx`);
}

// ── INIT ───────────────────────────────────────────────────────────────────────
render();
</script>

<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Salary Review</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{--bg:#0d1117;--s1:#161b22;--s2:#21262d;--s3:#2d333b;--bd:#30363d;--t1:#e6edf3;--t2:#8b949e;--t3:#6e7681;--acc:#d4a017;--acc-bg:rgba(212,160,23,.13);--blue:#388bfd;--blue-bg:rgba(56,139,253,.13);--green:#3fb950;--green-bg:rgba(63,185,80,.13);--red:#f85149;--red-bg:rgba(248,81,73,.13);--ora:#e8823a;--ora-bg:rgba(232,130,58,.13);--pur:#bc8cff;--pur-bg:rgba(188,140,255,.13);--teal:#39d0d8;--teal-bg:rgba(57,208,216,.13)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;display:flex}
.sidebar{width:220px;min-height:100vh;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;position:fixed;top:0;left:0;z-index:20}
.sb-brand{padding:20px 16px 16px;border-bottom:1px solid var(--bd)}
.sb-logo{width:36px;height:36px;background:var(--acc);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:9px}
.sb-name{font-size:12.5px;font-weight:800;letter-spacing:.08em;text-transform:uppercase}
.sb-sub{font-size:10.5px;color:var(--t3);margin-top:2px}
.sb-nav{padding:10px 7px;flex:1}
.sb-sec{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--t3);padding:10px 11px 5px}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 11px;border-radius:7px;cursor:pointer;color:var(--t2);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px}
.nav-item:hover{background:var(--s2);color:var(--t1)}
.nav-item.active{background:var(--acc-bg);color:var(--acc)}
.main{margin-left:220px;flex:1;display:flex;flex-direction:column}
.topbar{padding:13px 26px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;background:var(--s1);position:sticky;top:0;z-index:10}
.tb-title{font-size:15px;font-weight:800}
.tb-sub{font-size:11.5px;color:var(--t3);margin-top:1px}
.content{padding:24px 26px;flex:1}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;border:none;font-family:inherit;transition:all .15s}
.btn-primary{background:var(--acc);color:#0d1117}.btn-primary:hover{background:#e8b420}
.btn-secondary{background:var(--s3);color:var(--t1);border:1px solid var(--bd)}.btn-secondary:hover{background:var(--bd)}
.btn-ghost{background:transparent;color:var(--t2);border:1px solid var(--bd)}.btn-ghost:hover{background:var(--s2);color:var(--t1)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(248,81,73,.25)}.btn-danger:hover{background:var(--red);color:#fff}
.btn-excel{background:rgba(33,197,94,.13);color:#21c55e;border:1px solid rgba(33,197,94,.28)}.btn-excel:hover{background:#21c55e;color:#fff}
.btn-sm{padding:4px 9px;font-size:11.5px}
.btn-plus{width:28px;height:28px;min-width:28px;border-radius:6px;background:var(--s3);border:1px solid var(--bd);color:var(--acc);font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit;line-height:1}
.btn-plus:hover{background:var(--acc-bg);border-color:var(--acc)}
.card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:18px 20px}
.card-title{font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:14px;margin-bottom:20px}
.stat-card{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:16px 18px}
.stat-lbl{font-size:11px;color:var(--t3);font-weight:600;margin-bottom:7px}
.stat-val{font-size:21px;font-weight:700;font-family:'JetBrains Mono',monospace}
.stat-sub{font-size:10.5px;color:var(--t3);margin-top:3px}
.c-acc{color:var(--acc)}.c-blue{color:var(--blue)}.c-green{color:var(--green)}.c-red{color:var(--red)}.c-pur{color:var(--pur)}.c-teal{color:var(--teal)}.c-ora{color:var(--ora)}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{text-align:left;padding:9px 13px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--t3);border-bottom:1px solid var(--bd)}
tbody tr{border-bottom:1px solid var(--bd);transition:background .1s}
tbody tr:hover{background:var(--s2)}
tbody tr:last-child{border-bottom:none}
td{padding:11px 13px}
.td2{color:var(--t2);font-size:12px}
.tr-sum{background:var(--s2)!important}
.badge{display:inline-flex;align-items:center;padding:2px 7px;border-radius:5px;font-size:10.5px;font-weight:700}
.b-blue{background:var(--blue-bg);color:var(--blue)}.b-green{background:var(--green-bg);color:var(--green)}
.b-acc{background:var(--acc-bg);color:var(--acc)}.b-pur{background:var(--pur-bg);color:var(--pur)}
.b-ora{background:var(--ora-bg);color:var(--ora)}.b-teal{background:var(--teal-bg);color:var(--teal)}
.b-red{background:var(--red-bg);color:var(--red)}.b-gray{background:var(--s3);color:var(--t2)}
.money{font-family:'JetBrains Mono',monospace;font-weight:600}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:flex-start;justify-content:center;z-index:100;padding:36px 16px;overflow-y:auto}
.modal{background:var(--s1);border:1px solid var(--bd);border-radius:12px;width:100%;max-width:680px;animation:mIn .18s ease}
@keyframes mIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.mhd{padding:18px 22px 14px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between}
.mhd-title{font-size:15px;font-weight:800}
.m-close{width:26px;height:26px;border-radius:6px;background:var(--s3);border:none;color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.m-close:hover{background:var(--red-bg);color:var(--red)}
.mbody{padding:18px 22px}.mfoot{padding:14px 22px;border-top:1px solid var(--bd);display:flex;gap:8px;justify-content:flex-end}
.fsec{margin-bottom:18px}
.fsec-title{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--acc);margin-bottom:12px;padding-bottom:7px;border-bottom:1px solid var(--bd)}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fg{display:flex;flex-direction:column;gap:5px}.fg.full{grid-column:1/-1}
label{font-size:11.5px;font-weight:700;color:var(--t2)}
input,select,textarea{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:8px 11px;color:var(--t1);font-size:13px;font-family:inherit;outline:none;transition:border-color .15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
input[type=number]{font-family:'JetBrains Mono',monospace}
select option{background:var(--s2)}
textarea{resize:vertical;min-height:76px;line-height:1.55}
.hint{font-size:10.5px;color:var(--t3)}
.sel-row{display:flex;gap:6px;align-items:flex-end}
.sel-row select{flex:1}
.emp-hd{display:flex;align-items:flex-start;gap:18px;margin-bottom:20px}
.avatar{width:52px;height:52px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#0d1117;flex-shrink:0}
.emp-meta{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.meta-i{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--t2)}
.rev-card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px 18px;margin-bottom:12px}
.rev-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.rev-date{font-size:13px;font-weight:700;color:var(--acc)}
.sal-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.sal-item{background:var(--s3);border-radius:8px;padding:9px 11px}
.sal-lbl{font-size:9.5px;color:var(--t3);font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.sal-val{font-family:'JetBrains Mono',monospace;font-size:12.5px;font-weight:600}
.sal-approved{background:var(--green-bg);border:1px solid rgba(63,185,80,.25);border-radius:8px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sal-app-lbl{font-size:11.5px;color:var(--green);font-weight:700}
.sal-app-val{font-family:'JetBrains Mono',monospace;font-size:17px;font-weight:700;color:var(--green)}
.notes-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.note-item{background:var(--s3);border-radius:8px;padding:9px 11px}.note-item.full{grid-column:1/-1}
.note-lbl{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.note-txt{font-size:12.5px;color:var(--t1);line-height:1.55}
.searchbar{display:flex;align-items:center;gap:8px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:8px 12px;margin-bottom:14px}
.searchbar input{background:none;border:none;padding:0;font-size:13px;flex:1;color:var(--t1)}
.searchbar input:focus{border:none;outline:none}
.rev-bar{background:var(--s1);border:1px solid var(--bd);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:14px;margin-bottom:18px;flex-wrap:wrap}
.rev-bar label{font-size:12.5px;font-weight:700;color:var(--t2);white-space:nowrap}
.rbar-bg{height:7px;background:var(--s3);border-radius:4px;overflow:hidden;margin-top:6px}
.rbar-fill{height:100%;border-radius:4px;transition:width .5s}
.rbar-labels{display:flex;justify-content:space-between;margin-top:3px;font-size:10px;color:var(--t3)}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.chart-box{position:relative;height:230px}
.empty{text-align:center;padding:56px 20px;color:var(--t3)}
.empty-ico{font-size:38px;margin-bottom:10px}
.empty-txt{font-size:13.5px;margin-bottom:14px}
.back-btn{display:inline-flex;align-items:center;gap:6px;padding:5px 11px;border-radius:6px;background:var(--s2);border:1px solid var(--bd);color:var(--t2);font-size:12.5px;cursor:pointer;margin-bottom:18px;font-family:inherit;font-weight:500;transition:all .15s}
.back-btn:hover{color:var(--t1);background:var(--s3)}
.row-actions{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.flex-gap{display:flex;gap:6px}
.tr-click:hover td:first-child{color:var(--acc)}
.mini-3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.mini-box{background:var(--s2);border-radius:8px;padding:11px 14px}
.cmp-row{display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(48,54,61,.5)}
.cmp-row:last-child{border-bottom:none}
.cmp-lbl{font-size:12px;color:var(--t2);font-weight:500}
.cmp-val{font-size:13px}
.cmp-divider{height:1px;background:var(--bd);margin:8px 0}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sb-brand">
    <div class="sb-logo">💼</div>
    <div class="sb-name">HR Review</div>
    <div class="sb-sub">Hệ thống review lương</div>
  </div>
  <nav class="sb-nav">
    <div class="sb-sec">Tổng quan</div>
    <div class="nav-item active" id="nav-dashboard" onclick="nav('dashboard')"><span>📊</span> Dashboard</div>
    <div class="sb-sec">Quản lý</div>
    <div class="nav-item" id="nav-employees" onclick="nav('employees')"><span>👥</span> Nhân sự</div>
  </nav>
</div>
<div class="main">
  <div class="topbar">
    <div><div class="tb-title" id="tb-title">Dashboard</div><div class="tb-sub" id="tb-sub"></div></div>
    <div style="display:flex;align-items:center;gap:8px">
      <button class="btn btn-excel" onclick="exportExcel()">📥 Xuất Excel</button>
      <div id="tb-actions"></div>
    </div>
  </div>
  <div class="content" id="app"></div>
</div>
<div id="modal-root"></div>

<script>
// ── SEED DATA ──────────────────────────────────────────────────────────────────

let view='dashboard', selEmp=null;
function nav(v,params={}){
  view=v; if(params.empId) selEmp=params.empId;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const m={dashboard:'nav-dashboard',employees:'nav-employees','emp-detail':'nav-employees'};
  const el=document.getElementById(m[v]); if(el) el.classList.add('active');
  render();
}
function render(){
  if(view==='dashboard') renderDash();
  else if(view==='employees') renderEmpList();
  else if(view==='emp-detail') renderEmpDetail(selEmp);
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
const fm = n => (n&&n>0)?new Intl.NumberFormat('vi-VN').format(n)+' đ':'—';
const fms = n => {
  if(!n||n===0) return '—';
  if(n>=1e9) return (n/1e9).toFixed(1)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(0)+'K';
  return String(n);
};
const fd = d => d?new Date(d).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
const ini = n => {if(!n) return '?'; const w=n.trim().split(' '); return w.slice(-2).map(x=>x[0]).join('').toUpperCase();};
const sen = m => {if(!m) return '—'; const y=Math.floor(m/12),r=m%12; if(y&&r) return `${y}n ${r}th`; return y?`${y} năm`:`${m} tháng`;};
const latestRev = e => e.reviews?.length ? [...e.reviews].sort((a,b)=>new Date(b.reviewDate)-new Date(a.reviewDate))[0] : null;
const latestBasic = e => { const r=latestRev(e); return r?(r.approvedSalary||r.currentBaseSalary||0):0; };
const latestComm  = e => { const r=latestRev(e); return r?(r.avgCommission||0):0; };
const latestSales = e => { const r=latestRev(e); return r?(r.avgSales6m||0):0; };
const latestCurrentSalary   = e => { const r=latestRev(e); return r?(r.currentBaseSalary||0):0; };
const latestApprovedSalary  = e => { const r=latestRev(e); return r?(r.approvedSalary||0):0; };
const latestAllowance       = e => { const r=latestRev(e); return r?(r.allowance||0):0; };
const branchBadge = b => ({'Quan Hoa':'b-blue','Hà Đông':'b-acc','TXS':'b-pur'}[b]||'b-gray');
const monthsFrom = d => { if(!d) return 0; const s=new Date(d),n=new Date(); return Math.max(0,(n.getFullYear()-s.getFullYear())*12+(n.getMonth()-s.getMonth())); };
function calcSen(){
  const d=document.getElementById('f-joined')?.value;
  const m=monthsFrom(d);
  const disp=document.getElementById('f-sen-display');
  const hid=document.getElementById('f-sen');
  if(disp) disp.value=d?(sen(m)||'0 tháng'):'';
  if(hid) hid.value=m;
}
function calcRevSalary(){
  const x=+document.getElementById('r-basic')?.value||0;
  const f8=document.getElementById('r-sal-8h');
  const fh=document.getElementById('r-sal-hourly');
  if(f8) f8.value=x>0?Math.round(x/11*8):'';
  if(fh) fh.value=x>0?Math.round(x/26/11):'';
}
const posBadge = p => { if(!p) return 'b-gray'; if(p.includes('QL')||p.includes('Quản')) return 'b-red'; if(p.includes('CV')||p.includes('Chuyên')) return 'b-teal'; if(p.includes('KTV')||p.includes('Kỹ')) return 'b-blue'; return 'b-gray'; };

// ── CUSTOM OPTIONS ─────────────────────────────────────────────────────────────
function addOpt(type, selId) {
  const labels = {branches:'cơ sở',positions:'chức danh',depts:'phòng ban',shifts:'ca làm việc'};
  const val = prompt(`Nhập tên ${labels[type]} mới:`);
  if(!val||!val.trim()) return;
  const v = val.trim();
  if(!opts()[type].includes(v)) { opts()[type].push(v); save(); }
  const sel = document.getElementById(selId);
  if(sel) {
    if(![...sel.options].find(o=>o.value===v)) {
      const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o);
    }
    sel.value = v;
  }
}

function selOpts(type, selId, cur='') {
  const list = opts()[type]||[];
  return `
    <div class="sel-row">
      <select id="${selId}">
        <option value="">-- Chọn --</option>
        ${list.map(v=>`<option value="${v}" ${v===cur?'selected':''}>${v}</option>`).join('')}
      </select>
      <button type="button" class="btn-plus" onclick="addOpt('${type}','${selId}')" title="Thêm mới">+</button>
    </div>`;
}

function empRows(emps){
  return emps.map(e=>{
    const basic=latestBasic(e),comm=latestComm(e),sales=latestSales(e),rc=e.reviews?.length||0;
    const currentSal=latestCurrentSalary(e), approvedSal=latestApprovedSalary(e);
    const diff = approvedSal>0&&currentSal>0 ? approvedSal-currentSal : null;
    return `<tr class="tr-click" style="cursor:pointer" onclick="nav('emp-detail',{empId:'${e.id}'})">
      <td><div style="display:flex;align-items:center;gap:9px"><div style="width:30px;height:30px;border-radius:50%;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#0d1117;flex-shrink:0">${ini(e.name)}</div><span style="font-weight:700">${e.name}</span></div></td>
      <td><span class="badge ${branchBadge(e.branch)}">${e.branch||'—'}</span></td>
      <td><span class="badge ${posBadge(e.position)}">${e.position||'—'}</span></td>
      <td class="td2">${e.shift||'—'}</td>
      <td class="td2">${e.joinDate?sen(monthsFrom(e.joinDate)):sen(e.seniorityMonths)}</td>
      <td><span class="money td2">${currentSal?fms(currentSal):'—'}</span></td>
      <td><div style="display:flex;flex-direction:column;gap:2px">
        <span class="money c-green">${approvedSal?fms(approvedSal):'—'}</span>
        ${diff!==null?`<span style="font-size:10px;color:${diff>0?'var(--green)':diff<0?'var(--red)':'var(--t3)'}">${diff>0?'+':''}${fms(diff)}</span>`:''}
      </div></td>
      <td><span class="money c-pur">${comm?fms(comm):'—'}</span></td>
      <td><span class="money c-teal">${sales?fms(sales):'—'}</span></td>
      <td><span class="badge b-acc">${rc} đợt</span></td>
      <td onclick="event.stopPropagation()"><div class="flex-gap"><button class="btn btn-ghost btn-sm" onclick="openEditEmp('${e.id}')">✏️</button><button class="btn btn-danger btn-sm" onclick="delEmp('${e.id}')">🗑️</button></div></td>
    </tr>`;
  }).join('');
}
function filterEmps(){
  const q=document.getElementById('q').value.toLowerCase();
  const f=D.employees.filter(e=>e.name.toLowerCase().includes(q)||(e.branch||'').toLowerCase().includes(q)||(e.position||'').toLowerCase().includes(q)||(e.dept||'').toLowerCase().includes(q));
  const tb=document.getElementById('emp-tb'); if(tb) tb.innerHTML=empRows(f);
}

  const emp=D.employees.find(e=>e.id===id); if(!emp){nav('employees');return;}
  document.getElementById('tb-title').textContent=emp.name;
  document.getElementById('tb-sub').textContent=`${emp.position||''} · ${emp.branch||''}`;
  document.getElementById('tb-actions').innerHTML=`<button class="btn btn-primary" onclick="openAddRev('${emp.id}')">+ Thêm đợt review</button>`;
  const revs=[...(emp.reviews||[])].sort((a,b)=>new Date(b.reviewDate)-new Date(a.reviewDate));
  const latest=revs[0];
  document.getElementById('app').innerHTML=`
    <button class="back-btn" onclick="nav('employees')">← Quay lại</button>
    <div class="card" style="margin-bottom:18px">
      <div class="emp-hd">
        <div class="avatar">${ini(emp.name)}</div>

            <span class="meta-i">🏷 ${emp.dept||'Chưa rõ'}</span>
            <span class="meta-i">🕐 ${emp.shift||'Chưa rõ ca'}</span>
            <span class="meta-i">⏱ ${emp.joinDate?`${fd(emp.joinDate)} · ${sen(monthsFrom(emp.joinDate))}`:sen(emp.seniorityMonths)}</span>
          </div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="openEditEmp('${emp.id}')">✏️ Sửa</button>
      </div>
      ${latest?`<div class="mini-3">
        <div class="mini-box"><div class="stat-lbl">Lương cơ bản hiện tại</div><div class="stat-val c-acc" style="font-size:17px">${fms(latest.approvedSalary||latest.currentBaseSalary||0)}</div></div>
        <div class="mini-box"><div class="stat-lbl">HH / Dịch vụ TB</div><div class="stat-val c-pur" style="font-size:17px">${fms(latest.avgCommission||0)}</div></div>
        <div class="mini-box"><div class="stat-lbl">DT bán hàng TB 6th</div><div class="stat-val c-teal" style="font-size:17px">${fms(latest.avgSales6m||0)}</div></div>
      </div>`:''}
    </div>

      <div style="font-size:13.5px;font-weight:800">Lịch sử review (${revs.length} đợt)</div>
      <button class="btn btn-primary" onclick="openAddRev('${emp.id}')">+ Thêm đợt review</button>
    </div>

}
function revCard(rev,empId,isLatest){

      <div class="flex-gap"><button class="btn btn-ghost btn-sm" onclick="openEditRev('${empId}','${rev.id}')">✏️ Sửa</button><button class="btn btn-danger btn-sm" onclick="delRev('${empId}','${rev.id}')">🗑️</button></div>

    <div class="sal-grid" style="margin-bottom:14px">
      <div class="sal-item"><div class="sal-lbl">Lương CB (11 tiếng)</div><div class="sal-val c-acc">${fms(rev.currentBaseSalary)||'—'}</div></div>
      <div class="sal-item" style="background:rgba(212,160,23,.08);border:1px solid rgba(212,160,23,.18)"><div class="sal-lbl">⏱ Lương CB ca 8 tiếng</div><div class="sal-val c-acc">${rev.salary8h?fms(rev.salary8h):(rev.currentBaseSalary?fms(Math.round(rev.currentBaseSalary/11*8)):'—')}</div></div>
      <div class="sal-item" style="background:rgba(188,140,255,.08);border:1px solid rgba(188,140,255,.18)"><div class="sal-lbl">🕐 Lương giờ</div><div class="sal-val c-pur">${rev.currentBaseSalary?fms(Math.round(rev.currentBaseSalary/26/11)):'—'}</div></div>
      <div class="sal-item"><div class="sal-lbl">HH / Dịch vụ TB</div><div class="sal-val c-pur">${fms(rev.avgCommission)||'—'}</div></div>
      <div class="sal-item"><div class="sal-lbl">DT BH TB 6 tháng</div><div class="sal-val c-teal">${fms(rev.avgSales6m)||'—'}</div></div>
    </div>

    <div style="font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:8px">📋 Đề xuất lương mới</div>
    <div class="sal-grid" style="margin-bottom:14px">
      <div class="sal-item"><div class="sal-lbl">Đề xuất (Nhân viên)</div><div class="sal-val c-pur">${fms(rev.empProposed)||'—'}</div></div>
      <div class="sal-item"><div class="sal-lbl">Đề xuất (Quản lý)</div><div class="sal-val c-acc">${fms(rev.mgrProposed)||'—'}</div></div>
      <div class="sal-item"><div class="sal-lbl">Đề xuất (Ban VH)</div><div class="sal-val c-ora">${fms(rev.opsProposed)||'—'}</div></div>
      <div class="sal-item"><div class="sal-lbl">Phụ cấp sau review</div><div class="sal-val c-ora">${fms(rev.allowance)||'—'}</div></div>
    </div>

    <div style="font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--t3);margin-bottom:8px">✅ Kết quả duyệt</div>
    ${rev.approvedSalary?`
    <div class="sal-approved" style="margin-bottom:0">
      <div>
        <div class="sal-app-lbl">✅ Lương được duyệt chính thức</div>
        ${rev.approvedDate?`<div style="font-size:10.5px;color:var(--green);opacity:.8;margin-top:2px">Ngày duyệt: ${fd(rev.approvedDate)}</div>`:''}
        ${raise!==null?`<div style="font-size:10.5px;color:var(--green);margin-top:2px">Chênh lệch CB: ${raise>0?'+':''}${fms(raise)}</div>`:''}
        ${rev.allowance?`<div style="font-size:10.5px;color:var(--ora);margin-top:2px">Phụ cấp: +${fms(rev.allowance)}</div>`:''}
        ${rev.salary8h||rev.currentBaseSalary?`<div style="font-size:10.5px;color:var(--acc);margin-top:2px">Ca 8 tiếng sau duyệt: ${fms(Math.round((rev.approvedSalary||0)/11*8))}</div>`:''}
        ${rev.currentBaseSalary?`<div style="font-size:10.5px;color:var(--pur);margin-top:2px">Lương giờ sau duyệt: ${fms(Math.round((rev.approvedSalary||0)/26/11))}</div>`:''}

      ${n.cons?`<div class="note-item"><div class="note-lbl" style="color:var(--red)">⚠️ Nhược điểm</div><div class="note-txt">${n.cons}</div></div>`:''}

}

const closeModal=()=>document.getElementById('modal-root').innerHTML='';
function showModal(html){document.getElementById('modal-root').innerHTML=`<div class="overlay" onclick="if(event.target.classList.contains('overlay'))closeModal()"><div class="modal">${html}</div></div>`;}

// ── EMPLOYEE MODAL ─────────────────────────────────────────────────────────────
function openAddEmp(){empModal(null);}
function openEditEmp(id){empModal(D.employees.find(e=>e.id===id));}
function empModal(emp){
  showModal(`
    <div class="mhd"><div class="mhd-title">${emp?'Sửa nhân sự':'Thêm nhân sự mới'}</div><button class="m-close" onclick="closeModal()">✕</button></div>
    <div class="mbody">
      <div class="fsec"><div class="fsec-title">👤 Thông tin cơ bản</div>
        <div class="fgrid">
          <div class="fg full"><label>Họ & Tên *</label><input id="f-name" value="${emp?.name||''}" placeholder="Nguyễn Văn A"></div>
          <div class="fg"><label>Cơ sở</label>${selOpts('branches','f-branch',emp?.branch||'')}</div>
          <div class="fg"><label>Chức danh</label>${selOpts('positions','f-pos',emp?.position||'')}</div>
          <div class="fg"><label>Phòng ban</label>${selOpts('depts','f-dept',emp?.dept||'')}</div>
          <div class="fg"><label>Ca làm việc</label>${selOpts('shifts','f-shift',emp?.shift||'')}</div>
          <div class="fg"><label>Ngày vào công ty</label><input type="date" id="f-joined" value="${emp?.joinDate||''}" oninput="calcSen()"><span class="hint">Thâm niên tự động tính từ ngày này</span></div>
          <div class="fg"><label>Thâm niên</label><input type="text" id="f-sen-display" readonly placeholder="Tự động tính" style="background:var(--s3);color:var(--acc);font-weight:700;cursor:default"><input type="hidden" id="f-sen" value="${emp?.seniorityMonths||0}"></div>
        </div>
      </div>
    </div>
    <div class="mfoot"><button class="btn btn-ghost" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="saveEmp('${emp?.id||''}')">Lưu</button></div>`);
  setTimeout(calcSen,30);
}
function saveEmp(id){
  const name=document.getElementById('f-name').value.trim(); if(!name){alert('Vui lòng nhập tên');return;}
  const joinDate=document.getElementById('f-joined').value;
  const seniorityMonths=joinDate?monthsFrom(joinDate):(parseInt(document.getElementById('f-sen').value)||0);
  const data={name,branch:document.getElementById('f-branch').value,position:document.getElementById('f-pos').value,dept:document.getElementById('f-dept').value,shift:document.getElementById('f-shift').value,joinDate,seniorityMonths};
  if(id){const e=D.employees.find(x=>x.id===id);if(e)Object.assign(e,data);}
  else D.employees.push({id:uid('emp'),...data,reviews:[]});
  save();closeModal();render();
}
function delEmp(id){
  const e=D.employees.find(x=>x.id===id); if(!e||!confirm(`Xóa nhân sự "${e.name}"?`))return;
  D.employees=D.employees.filter(x=>x.id!==id); save(); if(view==='emp-detail')nav('employees');else render();
}

// ── REVIEW MODAL ───────────────────────────────────────────────────────────────
function openAddRev(empId){revModal(empId,null);}
function openEditRev(empId,revId){revModal(empId,revId);}
function revModal(empId,revId){
  const emp=D.employees.find(e=>e.id===empId); if(!emp)return;
  const rev=revId?emp.reviews.find(r=>r.id===revId):null;
  const n=rev?.notes||{};
  showModal(`
    <div class="mhd"><div class="mhd-title">${rev?'Sửa đợt review':'Thêm đợt review'} — ${emp.name}</div><button class="m-close" onclick="closeModal()">✕</button></div>
    <div class="mbody" style="max-height:72vh;overflow-y:auto">
      <div class="fsec"><div class="fsec-title">📅 Thông tin đợt review</div>
        <div class="fgrid"><div class="fg"><label>Ngày review *</label><input type="date" id="r-date" value="${rev?.reviewDate||new Date().toISOString().slice(0,10)}"></div></div>
      </div>
      <div class="fsec"><div class="fsec-title">💰 Thông tin lương</div>
        <div class="fgrid">
          <div class="fg"><label>Lương cơ bản hiện tại / 11 tiếng (đ)</label><input type="number" id="r-basic" placeholder="5000000" value="${rev?.currentBaseSalary||''}" oninput="calcRevSalary()"></div>
          <div class="fg"><label>HH / Dịch vụ trung bình (đ)</label><input type="number" id="r-comm" placeholder="3000000" value="${rev?.avgCommission||''}"></div>
          <div class="fg"><label>Lương CB ca 8 tiếng (đ)</label><input type="number" id="r-sal-8h" readonly value="${rev?.salary8h||''}" style="background:var(--s3);color:var(--acc);font-weight:700;cursor:default"><span class="hint">= Lương CB ÷ 11 × 8 (tự động)</span></div>
          <div class="fg"><label>Lương giờ (đ/giờ)</label><input type="number" id="r-sal-hourly" readonly value="${rev?.salaryHourly||''}" style="background:var(--s3);color:var(--pur);font-weight:700;cursor:default"><span class="hint">= Lương CB ÷ 26 ÷ 11 (tự động)</span></div>
          <div class="fg"><label>DT bán hàng TB 6 tháng (đ)</label><input type="number" id="r-sales" placeholder="50000000" value="${rev?.avgSales6m||''}"><span class="hint">Doanh thu sản phẩm/dịch vụ do NV tạo ra</span></div>
          <div class="fg"><label>Đề xuất từ nhân viên (đ)</label><input type="number" id="r-emp" value="${rev?.empProposed||''}"></div>
          <div class="fg"><label>Đề xuất từ quản lý (đ)</label><input type="number" id="r-mgr" value="${rev?.mgrProposed||''}"></div>
          <div class="fg"><label>Đề xuất từ ban vận hành (đ)</label><input type="number" id="r-ops" value="${rev?.opsProposed||''}"></div>
          <div class="fg"><label>Lương được duyệt chính thức (đ)</label><input type="number" id="r-app" value="${rev?.approvedSalary||''}"></div>
          <div class="fg"><label>Ngày duyệt chính thức</label><input type="date" id="r-appdate" value="${rev?.approvedDate||''}"></div>
          <div class="fg"><label>Phụ cấp (đ) — sau review</label><input type="number" id="r-allowance" placeholder="0" value="${rev?.allowance||''}"><span class="hint">Xăng xe, điện thoại, chuyên cần…</span></div>
        </div>
      </div>
      <div class="fsec"><div class="fsec-title">📝 Ghi chú review</div>
        <div class="fgrid">
          <div class="fg"><label>✅ Ưu điểm</label><textarea id="r-pros" style="resize:none;overflow:hidden" placeholder="Điểm mạnh, thành tích..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${n.pros||''}</textarea></div>
          <div class="fg"><label>⚠️ Nhược điểm</label><textarea id="r-cons" style="resize:none;overflow:hidden" placeholder="Điểm cần cải thiện..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${n.cons||''}</textarea></div>
          <div class="fg full"><label>🔍 Vấn đề nhận thấy</label><textarea id="r-jtbd" style="min-height:76px;resize:none;overflow:hidden" placeholder="Vấn đề quản lý nhận thấy..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${n.managerJTBD||''}</textarea></div>
          <div class="fg full"><label>💭 Mong muốn của nhân viên</label><textarea id="r-wish" style="resize:none;overflow:hidden" placeholder="Nhân viên muốn gì..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${n.employeeWish||''}</textarea></div>
          <div class="fg full"><label>🚀 Kế hoạch hành động sau review</label><textarea id="r-action" style="min-height:90px;resize:none;overflow:hidden" placeholder="Action plan cụ thể..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${n.actionPlan||''}</textarea></div>

    </div>
    <div class="mfoot"><button class="btn btn-ghost" onclick="closeModal()">Hủy</button><button class="btn btn-primary" onclick="saveRev('${empId}','${revId||''}')">Lưu đợt review</button></div>`);
  setTimeout(()=>{calcRevSalary();document.querySelectorAll('#modal-root textarea').forEach(t=>{t.style.height='auto';t.style.height=t.scrollHeight+'px';});},30);
}
function saveRev(empId,revId){
  const emp=D.employees.find(e=>e.id===empId); if(!emp)return;
  const d=document.getElementById('r-date').value; if(!d){alert('Chọn ngày review');return;}
  const data={reviewDate:d,currentBaseSalary:+document.getElementById('r-basic').value||0,avgCommission:+document.getElementById('r-comm').value||0,salary8h:+document.getElementById('r-sal-8h').value||0,salaryHourly:+document.getElementById('r-sal-hourly').value||0,avgSales6m:+document.getElementById('r-sales').value||0,empProposed:+document.getElementById('r-emp').value||0,mgrProposed:+document.getElementById('r-mgr').value||0,opsProposed:+document.getElementById('r-ops').value||0,approvedSalary:+document.getElementById('r-app').value||0,approvedDate:document.getElementById('r-appdate').value,allowance:+document.getElementById('r-allowance').value||0,notes:{pros:document.getElementById('r-pros').value.trim(),cons:document.getElementById('r-cons').value.trim(),managerJTBD:document.getElementById('r-jtbd').value.trim(),employeeWish:document.getElementById('r-wish').value.trim(),actionPlan:document.getElementById('r-action').value.trim()}};
  if(!emp.reviews) emp.reviews=[];
  if(revId){const i=emp.reviews.findIndex(r=>r.id===revId);if(i!==-1)emp.reviews[i]={...emp.reviews[i],...data};}
  else emp.reviews.push({id:uid('rev'),...data});
  save();closeModal();render();
}
function delRev(empId,revId){
  if(!confirm('Xóa đợt review này?'))return;
  const emp=D.employees.find(e=>e.id===empId); if(!emp)return;
  emp.reviews=emp.reviews.filter(r=>r.id!==revId); save();render();
}

    return [
      e.name||'',
      e.branch||'',
      e.position||'',
      e.dept||'',
      e.shift||'',
      e.seniorityMonths||0,

      r?(r.approvedSalary||r.currentBaseSalary||0):0,

  const noteRows = [];
  D.employees.forEach(e=>{
    const revs = [...(e.reviews||[])].sort((a,b)=>new Date(b.reviewDate)-new Date(a.reviewDate));
    revs.forEach(r=>{
      const n = r.notes||{};
      if(n.pros||n.cons||n.managerJTBD||n.employeeWish||n.actionPlan){
        noteRows.push([
          e.name||'',
          e.branch||'',
          e.position||'',
          r.reviewDate||'',
          n.pros||'',
          n.cons||'',
          n.managerJTBD||'',
          n.employeeWish||'',
          n.actionPlan||''
        ]);
      }
    });
  });
  const wsNote = XLSX.utils.aoa_to_sheet([noteHeader,...noteRows]);
  wsNote['!cols'] = [22,14,14,14,50,50,50,50,60].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, wsNote, 'Ưu nhược điểm');

  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `HR_Review_${date}.xlsx`);
}

render();
</script>

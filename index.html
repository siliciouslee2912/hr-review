<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyD0BJDO0R3ISvH9i4B9r6p-iJh-MbDo-9g",
  authDomain: "hr-review-a1371.firebaseapp.com",
  projectId: "hr-review-a1371",

  messagingSenderId: "91496548272",
  appId: "1:91496548272:web:4ca2ab01efac3eaa9f7875"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const REF = doc(db, 'hr', 'data');

// Expose helpers to global scope for non-module script
window._fbSave = async (data) => {
  try { await setDoc(REF, { payload: JSON.stringify(data) }); } catch(e){ console.error('Firebase save error', e); }
};

window._fbInit = async () => {
  try {
    const snap = await getDoc(REF);
    if (snap.exists()) {
      window._D = JSON.parse(snap.data().payload);
    }
  } catch(e) { console.warn('Firebase load failed, using SEED', e); }

  // Real-time listener — update & re-render when another device saves
  onSnapshot(REF, (snap) => {
    if (!snap.exists()) return;
    const remote = JSON.parse(snap.data().payload);
    // Only update if it's a change from another session
    if (JSON.stringify(remote) !== JSON.stringify(window.D)) {
      window.D = remote;
      if (typeof render === 'function') render();
    }
  });

  // Signal ready
  window._fbReady = true;
  document.dispatchEvent(new Event('fb-ready'));
};

window._fbInit();
</script>

let D = JSON.parse(JSON.stringify(SEED)); // default until Firebase loads
window.D = D;

const save = () => {
  window.D = D;
  if (window._fbSave) window._fbSave(D);
};
const uid = p => { const id=`${p}_${String(D.nid).padStart(4,'0')}`; D.nid++; save(); return id; };
const opts = () => D.options || SEED.options;

// ── ROUTING ────────────────────────────────────────────────────────────────────
let view='dashboard', selEmp=null;
function nav(v,params={}){
  view=v; if(params.empId) selEmp=params.empId;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const m={dashboard:'nav-dashboard',employees:'nav-employees','emp-detail':'nav-employees'};
  const el=document.getElementById(m[v]); if(el) el.classList.add('active');
  render();
}
function render(){
  if(view==='dashboard') renderDash();
  else if(view==='employees') renderEmpList();
  else if(view==='emp-detail') renderEmpDetail(selEmp);
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
const fm = n => (n&&n>0)?new Intl.NumberFormat('vi-VN').format(n)+' đ':'—';
const fms = n => {
  if(!n||n===0) return '—';
  if(n>=1e9) return (n/1e9).toFixed(1)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  if(n>=1e3) return (n/1e3).toFixed(0)+'K';
  return String(n);
};
const fd = d => d?new Date(d).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit',year:'numeric'}):'—';
const ini = n => {if(!n) return '?'; const w=n.trim().split(' '); return w.slice(-2).map(x=>x[0]).join('').toUpperCase();};
const sen = m => {if(!m) return '—'; const y=Math.floor(m/12),r=m%12; if(y&&r) return `${y}n ${r}th`; return y?`${y} năm`:`${m} tháng`;};
const latestRev = e => e.reviews?.length ? [...e.reviews].sort((a,b)=>new Date(b.reviewDate)-new Date(a.reviewDate))[0] : null;
const latestBasic = e => { const r=latestRev(e); return r?(r.approvedSalary||r.currentBaseSalary||0):0; };
const latestComm  = e => { const r=latestRev(e); return r?(r.avgCommission||0):0; };
const latestSales = e => { const r=latestRev(e); return r?(r.avgSales6m||0):0; };
const latestCurrentSalary   = e => { const r=latestRev(e); return r?(r.currentBaseSalary||0):0; };
const latestApprovedSalary  = e => { const r=latestRev(e); return r?(r.approvedSalary||0):0; };
const latestAllowance       = e => { const r=latestRev(e); return r?(r.allowance||0):0; };
const branchBadge = b => ({'Quan Hoa':'b-blue','Hà Đông':'b-acc','TXS':'b-pur'}[b]||'b-gray');
const monthsFrom = d => { if(!d) return 0; const s=new Date(d),n=new Date(); return Math.max(0,(n.getFullYear()-s.getFullYear())*12+(n.getMonth()-s.getMonth())); };
function calcSen(){
  const d=document.getElementById('f-joined')?.value;
  const m=monthsFrom(d);
  const disp=document.getElementById('f-sen-display');
  const hid=document.getElementById('f-sen');
  if(disp) disp.value=d?(sen(m)||'0 tháng'):'';
  if(hid) hid.value=m;
}
function calcRevSalary(){
  const x=+document.getElementById('r-basic')?.value||0;
  const f8=document.getElementById('r-sal-8h');
  const fh=document.getElementById('r-sal-hourly');
  if(f8) f8.value=x>0?Math.round(x/11*8):'';
  if(fh) fh.value=x>0?Math.round(x/26/11):'';
}
const posBadge = p => { if(!p) return 'b-gray'; if(p.includes('QL')||p.includes('Quản')) return 'b-red'; if(p.includes('CV')||p.includes('Chuyên')) return 'b-teal'; if(p.includes('KTV')||p.includes('Kỹ')) return 'b-blue'; return 'b-gray'; };

          <input id="opt-new-val" placeholder="Nhập tên ${label.toLowerCase()} mới..." style="flex:1">

    </div>`);

function startEditOpt(type, selId, i) {
  document.getElementById(`opt-txt-${i}`).style.display  = 'none';
  document.getElementById(`opt-inp-${i}`).style.display  = 'block';
  document.getElementById(`opt-save-${i}`).style.display = 'inline-flex';
  document.getElementById(`opt-inp-${i}`).focus();
  document.getElementById(`opt-inp-${i}`).addEventListener('keydown', e => { if(e.key==='Enter') saveEditOpt(type,selId,i); });
}

function saveEditOpt(type, selId, i) {
  const newVal = document.getElementById(`opt-inp-${i}`)?.value.trim();
  if (!newVal) return;
  const list = opts()[type];
  const oldVal = list[i];
  list[i] = newVal;
  // Update any employees using the old value
  if (type === 'branches') D.employees.forEach(e => { if(e.branch===oldVal) e.branch=newVal; });
  if (type === 'positions') D.employees.forEach(e => { if(e.position===oldVal) e.position=newVal; });
  if (type === 'depts')     D.employees.forEach(e => { if(e.dept===oldVal) e.dept=newVal; });
  if (type === 'shifts')    D.employees.forEach(e => { if(e.shift===oldVal) e.shift=newVal; });
  save();
  openOptManager(type, selId);
  // Re-select saved value in parent select after modal refreshes
  setTimeout(() => { const sel=document.getElementById(selId); if(sel) { refreshSelOpts(sel,type,newVal); }}, 50);
}

function delOpt(type, selId, val) {
  const list = opts()[type];
  const i = list.indexOf(val);
  if (i === -1) return;
  list.splice(i, 1);
  save();
  openOptManager(type, selId);
  setTimeout(() => { const sel=document.getElementById(selId); if(sel) refreshSelOpts(sel,type,sel.value===val?'':sel.value); }, 50);
}

function confirmAddOpt(type, selId) {
  const v = document.getElementById('opt-new-val')?.value.trim();
  if (!v) return;
  if (!opts()[type].includes(v)) { opts()[type].push(v); save(); }
  openOptManager(type, selId);
  setTimeout(() => { const sel=document.getElementById(selId); if(sel) refreshSelOpts(sel,type,v); }, 50);
}

function refreshSelOpts(sel, type, selectVal) {
  const list = opts()[type] || [];
  sel.innerHTML = `<option value="">-- Chọn --</option>` +
    list.map(v=>`<option value="${v}" ${v===selectVal?'selected':''}>${v}</option>`).join('');
}

function selOpts(type, selId, cur='') {
  const list = opts()[type]||[];
  return `
    <div class="sel-row">
      <select id="${selId}">
        <option value="">-- Chọn --</option>
        ${list.map(v=>`<option value="${v}" ${v===cur?'selected':''}>${v}</option>`).join('')}
      </select>
      <button type="button" class="btn-plus" onclick="addOpt('${type}','${selId}')" title="Quản lý danh mục">⚙️</button>
    </div>`;
}

      <td><div style="display:flex;flex-direction:column;gap:2px">
        <span class="money c-green">${approvedSal?fms(approvedSal):'—'}</span>
        ${diff!==null?`<span style="font-size:10px;color:${diff>0?'var(--green)':diff<0?'var(--red)':'var(--t3)'}">${diff>0?'+':''}${fms(diff)}</span>`:''}
      </div></td>
      <td><span class="money c-pur">${comm?fms(comm):'—'}</span></td>
      <td><span class="money c-teal">${sales?fms(sales):'—'}</span></td>
      <td><span class="badge b-acc">${rc} đợt</span></td>

    </tr>`;
  }).join('');
}
function filterEmps(){
  const q=document.getElementById('q').value.toLowerCase();
  const f=D.employees.filter(e=>e.name.toLowerCase().includes(q)||(e.branch||'').toLowerCase().includes(q)||(e.position||'').toLowerCase().includes(q)||(e.dept||'').toLowerCase().includes(q));

}

function saveEmp(id){
  const name=document.getElementById('f-name').value.trim(); if(!name){alert('Vui lòng nhập tên');return;}
  const joinDate=document.getElementById('f-joined').value;
  const seniorityMonths=joinDate?monthsFrom(joinDate):(parseInt(document.getElementById('f-sen').value)||0);
  const data={name,branch:document.getElementById('f-branch').value,position:document.getElementById('f-pos').value,dept:document.getElementById('f-dept').value,shift:document.getElementById('f-shift').value,joinDate,seniorityMonths};
  if(id){const e=D.employees.find(x=>x.id===id);if(e)Object.assign(e,data);}
  else D.employees.unshift({id:uid('emp'),...data,reviews:[]});
  save();closeModal();render();
}
function delEmp(id){
  const e=D.employees.find(x=>x.id===id); if(!e||!confirm(`Xóa nhân sự "${e.name}"?`))return;
  D.employees=D.employees.filter(x=>x.id!==id); save(); if(view==='emp-detail')nav('employees');else render();
}

          <div class="fg"><label>DT bán hàng TB 6 tháng (đ)</label><input type="number" id="r-sales" placeholder="50000000" value="${rev?.avgSales6m||''}"><span class="hint">Doanh thu sản phẩm/dịch vụ do NV tạo ra</span></div>
          <div class="fg"><label>Đề xuất từ nhân viên (đ)</label><input type="number" id="r-emp" value="${rev?.empProposed||''}"></div>
          <div class="fg"><label>Đề xuất từ quản lý (đ)</label><input type="number" id="r-mgr" value="${rev?.mgrProposed||''}"></div>
          <div class="fg"><label>Đề xuất từ ban vận hành (đ)</label><input type="number" id="r-ops" value="${rev?.opsProposed||''}"></div>
          <div class="fg"><label>Lương được duyệt chính thức (đ)</label><input type="number" id="r-app" value="${rev?.approvedSalary||''}"></div>
          <div class="fg"><label>Ngày duyệt chính thức</label><input type="date" id="r-appdate" value="${rev?.approvedDate||''}"></div>

          <div class="fg"><label>⚠️ Nhược điểm</label><textarea id="r-cons" style="resize:none;overflow:hidden" placeholder="Điểm cần cải thiện..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${n.cons||''}</textarea></div>
          <div class="fg full"><label>🔍 Vấn đề nhận thấy</label><textarea id="r-jtbd" style="min-height:76px;resize:none;overflow:hidden" placeholder="Vấn đề quản lý nhận thấy..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${n.managerJTBD||''}</textarea></div>
          <div class="fg full"><label>💭 Mong muốn của nhân viên</label><textarea id="r-wish" style="resize:none;overflow:hidden" placeholder="Nhân viên muốn gì..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${n.employeeWish||''}</textarea></div>
          <div class="fg full"><label>🚀 Kế hoạch hành động sau review</label><textarea id="r-action" style="min-height:90px;resize:none;overflow:hidden" placeholder="Action plan cụ thể..." oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'">${n.actionPlan||''}</textarea></div>

function saveRev(empId,revId){
  const emp=D.employees.find(e=>e.id===empId); if(!emp)return;
  const d=document.getElementById('r-date').value; if(!d){alert('Chọn ngày review');return;}
  const data={reviewDate:d,currentBaseSalary:+document.getElementById('r-basic').value||0,avgCommission:+document.getElementById('r-comm').value||0,salary8h:+document.getElementById('r-sal-8h').value||0,salaryHourly:+document.getElementById('r-sal-hourly').value||0,avgSales6m:+document.getElementById('r-sales').value||0,empProposed:+document.getElementById('r-emp').value||0,mgrProposed:+document.getElementById('r-mgr').value||0,opsProposed:+document.getElementById('r-ops').value||0,approvedSalary:+document.getElementById('r-app').value||0,approvedDate:document.getElementById('r-appdate').value,allowance:+document.getElementById('r-allowance').value||0,notes:{pros:document.getElementById('r-pros').value.trim(),cons:document.getElementById('r-cons').value.trim(),managerJTBD:document.getElementById('r-jtbd').value.trim(),employeeWish:document.getElementById('r-wish').value.trim(),actionPlan:document.getElementById('r-action').value.trim()}};
  if(!emp.reviews) emp.reviews=[];
  if(revId){const i=emp.reviews.findIndex(r=>r.id===revId);if(i!==-1)emp.reviews[i]={...emp.reviews[i],...data};}
  else emp.reviews.push({id:uid('rev'),...data});
  save();closeModal();render();
}
function delRev(empId,revId){
  if(!confirm('Xóa đợt review này?'))return;
  const emp=D.employees.find(e=>e.id===empId); if(!emp)return;
  emp.reviews=emp.reviews.filter(r=>r.id!==revId); save();render();
}

function exportExcel(){
  const wb = XLSX.utils.book_new();

  // ── Sheet 1: Tổng hợp nhân sự ──
  const sumHeader = [
    'Họ & Tên','Cơ sở','Chức danh','Phòng ban','Ca làm việc',
    'Ngày vào công ty','Thâm niên (tháng)',
    'Số đợt review',
    'Lương CB (11h) (đ)','Lương CB ca 8h (đ)','Lương giờ (đ)',
    'HH/DV TB (đ)','DT BH TB 6th (đ)',
    'Lương CB duyệt (đ)','Phụ cấp (đ)','Tổng quỹ lương (đ)'
  ];
  const sumRows = D.employees.map(e=>{
    const r = latestRev(e);
    const cb   = r?(r.currentBaseSalary||0):0;
    const app  = r?(r.approvedSalary||0):0;
    const comm = r?(r.avgCommission||0):0;
    const alw  = r?(r.allowance||0):0;
    const sen  = e.joinDate ? monthsFrom(e.joinDate) : (e.seniorityMonths||0);
    return [
      e.name||'',
      e.branch||'',
      e.position||'',
      e.dept||'',
      e.shift||'',
      e.joinDate||'',
      sen,
      e.reviews?.length||0,
      cb,
      cb>0?Math.round(cb/11*8):0,
      cb>0?Math.round(cb/26/11):0,
      comm,
      r?(r.avgSales6m||0):0,
      app,
      alw,
      (app||cb)+comm+alw
    ];
  });
  const wsSum = XLSX.utils.aoa_to_sheet([sumHeader,...sumRows]);
  wsSum['!cols'] = [24,14,16,14,14,16,12,10,18,18,14,16,18,18,14,18].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, wsSum, 'Tổng hợp nhân sự');

  // ── Sheet 2: Chi tiết đợt review (mỗi dòng = 1 đợt) ──
  const revHeader = [
    'Họ & Tên','Cơ sở','Chức danh','Phòng ban','Ca làm việc',
    'Ngày vào công ty','Thâm niên (tháng)',
    'Ngày review',
    'Lương CB (11h) (đ)','Lương CB ca 8h (đ)','Lương giờ (đ)',
    'HH/DV TB (đ)','DT BH TB 6th (đ)',
    'Đề xuất - Nhân viên (đ)','Đề xuất - Quản lý (đ)','Đề xuất - Ban VH (đ)',
    'Lương CB duyệt (đ)','Ngày duyệt','Phụ cấp (đ)','Tổng quỹ lương (đ)',
    '✅ Ưu điểm','⚠️ Nhược điểm',
    '🔍 Vấn đề nhận thấy','💭 Mong muốn NV','🚀 Kế hoạch hành động'
  ];
  const revRows = [];
  D.employees.forEach(e=>{
    const revs = [...(e.reviews||[])].sort((a,b)=>new Date(b.reviewDate)-new Date(a.reviewDate));
    const sen  = e.joinDate ? monthsFrom(e.joinDate) : (e.seniorityMonths||0);
    revs.forEach(r=>{
      const n   = r.notes||{};
      const cb  = r.currentBaseSalary||0;
      const app = r.approvedSalary||0;
      const comm= r.avgCommission||0;
      const alw = r.allowance||0;
      revRows.push([
        e.name||'', e.branch||'', e.position||'', e.dept||'', e.shift||'',
        e.joinDate||'', sen,
        r.reviewDate||'',
        cb,
        r.salary8h||(cb>0?Math.round(cb/11*8):0),
        r.salaryHourly||(cb>0?Math.round(cb/26/11):0),
        comm,
        r.avgSales6m||0,
        r.empProposed||0, r.mgrProposed||0, r.opsProposed||0,
        app, r.approvedDate||'', alw,
        (app||cb)+comm+alw,
        n.pros||'', n.cons||'',
        n.managerJTBD||'', n.employeeWish||'', n.actionPlan||''
      ]);
    });
  });
  const wsRev = XLSX.utils.aoa_to_sheet([revHeader,...revRows]);
  wsRev['!cols'] = [24,14,16,14,14,16,12,14,18,18,14,16,18,18,18,16,18,14,14,18,50,50,50,50,60].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, wsRev, 'Chi tiết review');

  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `HR_Review_${date}.xlsx`);
}

// Show loading until Firebase responds
document.getElementById('app').innerHTML = `<div class="empty"><div class="empty-ico">🔄</div><div class="empty-txt" id="load-txt">Đang kết nối dữ liệu...</div></div>`;

function initFromFirebase() {
  if (window._D) { D = window._D; window.D = D; }

  // ── DATA MIGRATION ──
  let migrated = false;

  // v2: TXS - lương dịch vụ + phụ cấp
  if (!D._migrationV || D._migrationV < 2) {
    const TXS = {
      'emp_0009':{avgCommission:4802000,allowance:520000},
      'emp_0010':{avgCommission:4006000,allowance:520000},
      'emp_0011':{avgCommission:4615000,allowance:520000},
      'emp_0012':{avgCommission:6289000,allowance:820000},
      'emp_0013':{avgCommission:4564000,allowance:820000},
      'emp_0014':{avgCommission:2346000,allowance:520000},
      'emp_0015':{avgCommission:1787000,allowance:820000},
      'emp_0016':{avgCommission:1990000,allowance:520000},
    };
    D.employees.forEach(e=>{
      const p=TXS[e.id]; if(!p||!e.reviews?.length) return;
      const r=e.reviews.find(r=>r.reviewDate==='2026-03-29')||e.reviews[0];
      r.avgCommission=p.avgCommission; r.allowance=p.allowance; migrated=true;
    });
  }

  // v3: Quan Hoa - lương dịch vụ + phụ cấp
  if (!D._migrationV || D._migrationV < 3) {
    const QH = {
      'emp_0001':{avgCommission:2421000,allowance:520000},
      'emp_0002':{avgCommission:3400000,allowance:880000},
      'emp_0003':{avgCommission:2658000,allowance:540000},
      'emp_0004':{avgCommission:3185000,allowance:880000},
      'emp_0005':{avgCommission:3622000,allowance:560000},
      'emp_0007':{avgCommission:3347000,allowance:900000},
    };
    D.employees.forEach(e=>{
      const p=QH[e.id]; if(!p||!e.reviews?.length) return;
      const r=e.reviews.find(r=>r.reviewDate==='2026-03-29')||e.reviews[0];
      r.avgCommission=p.avgCommission; r.allowance=p.allowance; migrated=true;
    });
  }

  // v4: Hà Đông - lương dịch vụ + phụ cấp
  if (!D._migrationV || D._migrationV < 4) {
    const HD = {
      'emp_0006':{avgCommission:1987000, allowance:240000+300000},  // Quỳnh Anh: ăn 240k + xe 300k
      'emp_0008':{avgCommission:3020000, allowance:340000+300000},  // Tú Anh: ăn 340k + xe 300k
    };
    D.employees.forEach(e=>{
      const p=HD[e.id]; if(!p||!e.reviews?.length) return;
      const r=e.reviews.find(r=>r.reviewDate==='2026-03-29')||e.reviews[0];
      r.avgCommission=p.avgCommission; r.allowance=p.allowance; migrated=true;
    });
  }

  // v5: chuẩn hoá phụ cấp ăn thành 520k cho tất cả (xe 300k giữ nguyên cho ai có)
  if (!D._migrationV || D._migrationV < 5) {
    const ALLOWANCE = {
      'emp_0001':520000,  'emp_0002':820000,  'emp_0003':520000,  'emp_0004':820000,
      'emp_0005':520000,  'emp_0006':820000,  'emp_0007':820000,  'emp_0008':820000,
      'emp_0009':520000,  'emp_0010':520000,  'emp_0011':520000,  'emp_0012':820000,
      'emp_0013':820000,  'emp_0014':520000,  'emp_0015':820000,  'emp_0016':520000,
    };
    D.employees.forEach(e=>{
      const a=ALLOWANCE[e.id]; if(!a||!e.reviews?.length) return;
      const r=e.reviews.find(r=>r.reviewDate==='2026-03-29')||e.reviews[0];
      r.allowance=a; migrated=true;
    });
    D._migrationV=5; migrated=true;
  }
  if (migrated) save();
  // ── END MIGRATION ──

  render();
}

if (window._fbReady) {
  initFromFirebase();
} else {
  document.addEventListener('fb-ready', initFromFirebase, { once: true });
  setTimeout(() => {
    if (window._fbReady) return;
    document.getElementById('load-txt').textContent = 'Không kết nối được Firebase, dùng dữ liệu cục bộ.';
    setTimeout(render, 1000);
  }, 4000);
}
</script>
